<!doctype html>
<html lang="pt-br" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>XPACE — UI Kit</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#050505;color:#fff;font-family:var(--xp-font-body);}
  /* Spacer to clear fixed nav */
  .nav-spacer{height:0;}
  /* WhatsApp floating button */
  .wa-fab{position:fixed;right:24px;bottom:24px;z-index:60;width:56px;height:56px;border-radius:9999px;background:#22c55e;color:#fff;display:grid;place-items:center;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(34,197,94,0.3);}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>
<button class="wa-fab" title="WhatsApp">
  <span class="material-symbols-outlined" style="font-size:28px;">chat</span>
</button>

<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Marquee.jsx"></script>
<script type="text/babel" src="FeatureGrid.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <>
      <Navbar />
      <Hero />
      <Marquee />
      <FeatureGrid />
      <Pricing />
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
