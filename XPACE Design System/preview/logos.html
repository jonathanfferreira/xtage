<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>XPACE — Brand Logos</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:24px;background:#050505;color:#fff;font-family:var(--xp-font-body);}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  .tile{background:#0a0a0a;border:1px solid #1f1f1f;border-radius:12px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:120px;justify-content:center;}
  .tile img{max-width:100%;max-height:64px;object-fit:contain;}
  .lbl{font-family:var(--xp-font-tech);font-size:10px;letter-spacing:.2em;color:#a0a0a0;text-transform:uppercase;text-align:center;line-height:1.3;}
  .light{background:#f8f8f8;}
  .light .lbl{color:#666;}
</style></head>
<body>
<div class="grid">
  <div class="tile light"><img src="../assets/logo/xpace-logo-black.png" alt=""><div class="lbl">Wordmark / Black</div></div>
  <div class="tile"><img src="../assets/logo/xpace-logo-white.png" alt=""><div class="lbl">Wordmark / White</div></div>
  <div class="tile light"><img src="../assets/logo/xpace-perfil-black.png" alt=""><div class="lbl">Perfil / Black</div></div>
  <div class="tile"><img src="../assets/logo/xpace-perfil-white.png" alt=""><div class="lbl">Perfil / White</div></div>
  <div class="tile light"><img src="../assets/logo/xpace-symbol-black.png" alt=""><div class="lbl">Symbol / Black</div></div>
  <div class="tile"><img src="../assets/logo/xpace-symbol-white.png" alt=""><div class="lbl">Symbol / White</div></div>
  <div class="tile light"><img src="../assets/logo/xpace-xp-black.png" alt=""><div class="lbl">XP Badge / Black</div></div>
  <div class="tile"><img src="../assets/logo/xpace-xp-white.png" alt=""><div class="lbl">XP Badge / White</div></div>
  <div class="tile light"><img src="../assets/logo/xpace-company-black.png" alt=""><div class="lbl">Company / Black</div></div>
  <div class="tile"><img src="../assets/logo/xpace-company-white.png" alt=""><div class="lbl">Company / White</div></div>
  <div class="tile light"><img src="../assets/logo/xpace-on-black.png" alt=""><div class="lbl">ON / Black</div></div>
  <div class="tile"><img src="../assets/logo/xpace-on-white.png" alt=""><div class="lbl">ON / White</div></div>
</div>
</body></html>
