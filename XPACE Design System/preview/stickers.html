<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>XPACE — Stickers</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:24px;background:#fff;color:#050505;font-family:var(--xp-font-body);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .tile{background:#f8f8f8;border:1px solid #e5e5e5;border-radius:12px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:130px;justify-content:center;}
  .tile img{max-width:100%;max-height:88px;object-fit:contain;}
  .lbl{font-family:var(--xp-font-tech);font-size:10px;letter-spacing:.22em;color:#666;text-transform:uppercase;text-align:center;}
</style></head>
<body>
<div class="row">
  <div class="tile"><img src="../assets/decor/xpace-sticker.png"><div class="lbl">XPACE Sticker</div></div>
  <div class="tile"><img src="../assets/decor/xpace-company-sticker.png"><div class="lbl">Company Sticker</div></div>
  <div class="tile"><img src="../assets/decor/xpace-arrow.png"><div class="lbl">Seta / Indicação</div></div>
  <div class="tile" style="background:#050505;"><img src="../assets/logo/xpace-on-white.png" style="max-height:64px;"><div class="lbl" style="color:#a0a0a0;">ON Sticker</div></div>
</div>
</body></html>
