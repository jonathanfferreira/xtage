<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>XPACE — Neutrals & Accents</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:24px;background:#050505;color:#fff;font-family:var(--xp-font-body);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .sw{border-radius:12px;padding:14px;min-height:130px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,.08);}
  .name{font-family:var(--xp-font-display);font-weight:800;font-size:18px;text-transform:uppercase;letter-spacing:-.01em;line-height:1;}
  .hex{font-family:var(--xp-font-mono);font-size:11px;opacity:.85;}
  .meta{font-family:var(--xp-font-tech);font-size:9px;letter-spacing:.22em;text-transform:uppercase;opacity:.7;}
  .row2{margin-top:14px;}
</style></head>
<body>
<div class="grid">
  <div class="sw" style="background:#050505;color:#fff;"><div class="meta">BG / Dark</div><div class="name">Black</div><div class="hex">#050505</div></div>
  <div class="sw" style="background:#0a0a0a;color:#fff;"><div class="meta">Surface Dark</div><div class="name">Surface</div><div class="hex">#0A0A0A</div></div>
  <div class="sw" style="background:#1f1f1f;color:#fff;"><div class="meta">Line Dark</div><div class="name">Line</div><div class="hex">#1F1F1F</div></div>
  <div class="sw" style="background:#a0a0a0;color:#050505;"><div class="meta">Muted / Dark</div><div class="name">Muted</div><div class="hex">#A0A0A0</div></div>
  <div class="sw" style="background:#ffffff;color:#050505;"><div class="meta">FG / Light</div><div class="name">White</div><div class="hex">#FFFFFF</div></div>
</div>
<div class="grid row2">
  <div class="sw" style="background:#ffd700;color:#050505;box-shadow:0 0 24px rgba(255,215,0,.35);"><div class="meta">VIP Plan</div><div class="name">Gold</div><div class="hex">#FFD700</div></div>
  <div class="sw" style="background:#fdb931;color:#050505;"><div class="meta">VIP Warm</div><div class="name">Gold Warm</div><div class="hex">#FDB931</div></div>
  <div class="sw" style="background:#00ff00;color:#050505;"><div class="meta">PRO Program</div><div class="name">Acid</div><div class="hex">#00FF00</div></div>
  <div class="sw" style="background:#22c55e;color:#050505;"><div class="meta">WhatsApp / Book</div><div class="name">Success</div><div class="hex">#22C55E</div></div>
  <div class="sw" style="background:#f8f8f8;color:#050505;"><div class="meta">Surface / Light</div><div class="name">Surface</div><div class="hex">#F8F8F8</div></div>
</div>
</body></html>
