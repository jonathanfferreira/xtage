<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>XPACE — Gradients</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:24px;background:#050505;color:#fff;font-family:var(--xp-font-body);}
  .grad{height:120px;border-radius:14px;margin-bottom:14px;display:flex;align-items:flex-end;padding:14px 18px;justify-content:space-between;}
  .lbl{font-family:var(--xp-font-display);font-weight:800;text-transform:uppercase;letter-spacing:-.01em;font-size:20px;}
  .meta{font-family:var(--xp-font-mono);font-size:11px;background:rgba(0,0,0,.4);padding:4px 8px;border-radius:6px;}
</style></head>
<body>
<div class="grad" style="background:linear-gradient(90deg,#6324b2 0%,#eb00bc 100%);"><span class="lbl">Primary → Pink</span><span class="meta">--xp-grad-primary</span></div>
<div class="grad" style="background:linear-gradient(90deg,#eb00bc 0%,#ff5200 100%);"><span class="lbl">Hot — Pink → Orange</span><span class="meta">--xp-grad-hot</span></div>
<div class="grad" style="background:linear-gradient(90deg,#6324b2 0%,#eb00bc 50%,#ff5200 100%);"><span class="lbl">Triad</span><span class="meta">--xp-grad-triad</span></div>
<div class="grad" style="background:linear-gradient(90deg,#ffd700 0%,#fdb931 50%,#ffd700 100%);color:#050505;"><span class="lbl">VIP Gold</span><span class="meta">--xp-grad-vip</span></div>
</body></html>
