<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>XPACE — Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:28px;background:#fff;color:#050505;font-family:var(--xp-font-body);}
  .row{margin-bottom:22px;}
  .meta{font-family:var(--xp-font-tech);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:#888;margin-bottom:6px;}
  .h1{font-family:var(--xp-font-display);font-weight:900;font-size:80px;line-height:.85;letter-spacing:-.02em;text-transform:uppercase;}
  .h2{font-family:var(--xp-font-tech);font-weight:700;font-size:44px;line-height:.95;letter-spacing:.04em;text-transform:uppercase;}
  .body{font-family:var(--xp-font-body);font-weight:400;font-size:16px;line-height:1.6;color:#333;max-width:560px;}
  .grad{background:linear-gradient(90deg,#6324b2,#eb00bc);-webkit-background-clip:text;background-clip:text;color:transparent;}
</style></head>
<body>
<div class="row"><div class="meta">H1 · Chillax 900 · UPPERCASE · −0.02em</div><div class="h1">Mova-se <span class="grad">Além</span></div></div>
<div class="row"><div class="meta">H2 · Steelfish 700 · UPPERCASE · 0.04em</div><div class="h2">Grade Semanal · Joinville-SC</div></div>
<div class="row"><div class="meta">Body · Poppins 400 · 16/1.6 · sentence case</div><div class="body">Educação em dança impulsionada por tecnologia premium. Hip Hop, Jazz Funk, K-Pop, Heels e Ballet — do iniciante ao avançado.</div></div>
</body></html>
