<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>XPACE — Chips & Tags</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:28px;background:#050505;color:#fff;font-family:var(--xp-font-body);display:flex;flex-direction:column;gap:14px;align-items:flex-start;}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{font-family:var(--xp-font-tech);font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase;padding:6px 12px;border:1px solid;border-radius:9999px;display:inline-flex;align-items:center;gap:8px;}
  .dot{width:6px;height:6px;border-radius:50%;}
  .pill-room{padding:4px 10px;border-radius:9999px;font-family:var(--xp-font-tech);font-size:10px;letter-spacing:.22em;text-transform:uppercase;border:1px solid;}
  .age{padding:3px 8px;border-radius:4px;font-family:var(--xp-font-tech);font-size:10px;letter-spacing:.22em;text-transform:uppercase;background:#1f1f1f;color:#a0a0a0;}
</style></head>
<body>
<div class="row">
  <span class="chip" style="color:#6324b2;border-color:#6324b2;">XPERIENCE</span>
  <span class="chip" style="color:#eb00bc;border-color:#eb00bc;">XLAB</span>
  <span class="chip" style="color:#ff5200;border-color:#ff5200;">XCORE</span>
  <span class="chip" style="color:#fff;border-color:rgba(255,255,255,.4);">XTAGE</span>
</div>
<div class="row">
  <span class="pill-room" style="color:#6324b2;border-color:#6324b2;background:rgba(99,36,178,.1);">XPERIENCE</span>
  <span class="pill-room" style="color:#eb00bc;border-color:#eb00bc;background:rgba(235,0,188,.1);">XLAB</span>
  <span class="pill-room" style="color:#ff5200;border-color:#ff5200;background:rgba(255,82,0,.1);">XCORE</span>
</div>
<div class="row">
  <span class="age">Acima 5+</span>
  <span class="age">Acima 12+</span>
  <span class="age">Acima 18+</span>
</div>
<div class="row" style="font-family:var(--xp-font-tech);font-size:12px;letter-spacing:.22em;color:#a0a0a0;">
  <span style="display:flex;align-items:center;gap:6px;"><span class="dot" style="background:#6324b2;"></span>XPERIENCE</span>
  <span style="display:flex;align-items:center;gap:6px;"><span class="dot" style="background:#eb00bc;"></span>XLAB</span>
  <span style="display:flex;align-items:center;gap:6px;"><span class="dot" style="background:#ff5200;"></span>XCORE</span>
</div>
</body></html>
